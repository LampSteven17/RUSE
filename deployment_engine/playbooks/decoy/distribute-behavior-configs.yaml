---
# Ansible Playbook: distribute-behavior-configs.yaml
# Distribute PHASE behavioral configs to deployed SUP VMs.
# Configs take effect at the next cluster boundary — no restart needed.
#
# Usage:
#   ansible-playbook -i inventory.ini distribute-behavior-configs.yaml \
#       -e config_source=~/PHASE/feedback_engine/configs/...
#   ansible-playbook -i inventory.ini distribute-behavior-configs.yaml \
#       -e clear_configs=true

- name: Distribute PHASE behavioral configs
  hosts: sup_hosts
  become: yes
  strategy: free
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ConnectTimeout=30 -o IdentitiesOnly=yes'
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    ruse_path: "/opt/ruse"
    config_source: ""
    clear_configs: false

  tasks:
    # ── Skip controls ────────────────────────────────────────────────
    - name: Skip control configs (C0, M0)
      meta: end_host
      when: sup_behavior in ['C0', 'M0']

    # ── Derive baseline config key ───────────────────────────────────
    - name: Derive behavior directory
      set_fact:
        behavior_dir: "{{ sup_behavior | regex_replace('^([A-Z])\\d+[A-Z]*(.*)$', '\\g<1>\\g<2>') }}"

    - name: Derive baseline version (M=1, B/S=0)
      set_fact:
        baseline_version: "{{ '1' if sup_behavior[0] == 'M' else '0' }}"

    - name: Derive baseline config key
      set_fact:
        baseline_config: "{{ sup_behavior | regex_replace('^([A-Z])\\d+', '\\g<1>VVVV') | replace('VVVV', baseline_version) }}"

    # ── Clear mode ───────────────────────────────────────────────────
    - name: Clear behavior configs
      when: clear_configs | bool
      block:
        - name: Remove behavioral_configurations contents
          file:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/"
            state: absent

        - name: Re-create empty directory
          file:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/"
            state: directory
            mode: '0755'

    # ── Deploy mode ──────────────────────────────────────────────────
    - name: Deploy behavior configs
      when: not (clear_configs | bool)
      block:
        - name: Validate config_source is set
          fail:
            msg: "config_source must be set. Use -e config_source=/path/to/configs"
          when: config_source == ""
          run_once: true
          delegate_to: localhost

        - name: Resolve source directory
          set_fact:
            config_source_dir: "{{ config_source }}/{{ behavior_dir }}/{{ baseline_config }}"

        - name: Check source exists
          stat:
            path: "{{ config_source_dir }}"
          delegate_to: localhost
          register: source_dir

        - name: Assert behavior config source exists
          # Previously the deploy block was gated on `when: source_dir.stat.exists`
          # which meant if the source dir was missing (typo, regen failed, wrong
          # path), the playbook silently skipped config distribution and the
          # feedback deploy degraded to baseline with no warning.
          fail:
            msg: >-
              Behavior config source not found: {{ config_source_dir }}
              (resolved from config_source={{ config_source }}, behavior_dir={{ behavior_dir }},
              baseline_config={{ baseline_config }}). Either the PHASE feedback engine
              didn't generate this config, or the source path is wrong.
          when: not source_dir.stat.exists

        - name: Ensure behavioral_configurations directory
          file:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/"
            state: directory
            mode: '0755'

        - name: Resolve behavior_configs patterns
          set_fact:
            resolved_behavior_configs: "{{ ['*.json'] if (behavior_configs is not defined or behavior_configs == 'all') else behavior_configs }}"

        - name: Find config files
          find:
            paths: "{{ config_source_dir }}"
            patterns: "{{ resolved_behavior_configs }}"
          delegate_to: localhost
          register: behavior_config_files

        - name: Assert config files were found
          fail:
            msg: >-
              No config files matched patterns {{ resolved_behavior_configs }}
              in {{ config_source_dir }}. PHASE generated an empty or malformed
              feedback source.
          when: behavior_config_files.files | length == 0

        - name: Validate behavior.json parses as JSON
          # Fail-loud before shipping a corrupt file to the VM — otherwise the
          # agent loads it, json.load() raises, the service crash-loops, and
          # the failure only surfaces on the next audit run. Parsing here
          # means an invalid file aborts the deploy with the filename in the
          # error message.
          delegate_to: localhost
          shell: "python3 -m json.tool < {{ item.path | quote }} > /dev/null"
          loop: "{{ behavior_config_files.files }}"
          loop_control:
            label: "{{ item.path | basename }}"
          changed_when: false

        - name: Copy configs to SUP
          copy:
            src: "{{ item.path }}"
            dest: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/{{ item.path | basename }}"
            mode: '0644'
          loop: "{{ behavior_config_files.files }}"
          loop_control:
            label: "{{ item.path | basename }}"

        # Install-time fail-loud: behavior.json must be on disk after the
        # copy step. That's the one check — if the brain has the file, it
        # will eventually settle (audit catches ongoing health).
        - name: Verify behavior.json landed on VM
          stat:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/behavior.json"
          register: vm_behavior_json

        - name: Assert behavior.json present on VM
          fail:
            msg: >-
              behavior.json missing at
              {{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/behavior.json
              on {{ inventory_hostname }} after distribution. Copy step above did
              not produce the file.
          when: not vm_behavior_json.stat.exists

        # ── Start service AFTER behavior.json lands ────────────────────
        # install-sups.yaml ran INSTALL_SUP.sh with RUSE_NO_SERVICE_START=1, so
        # the service is enabled but stopped. Now that behavior.json is on disk
        # the brain's mandatory-config check will pass on first start — no
        # crash-loop, no inflated NRestarts, audit stays clean. systemd module
        # uses `state: started` (idempotent) rather than restart, so a re-run
        # of distribute on an already-running service doesn't bounce it.
        - name: Derive systemd unit name
          set_fact:
            sup_service_name: "{{ sup_behavior | lower | replace('.', '_') }}.service"

        - name: Start SUP service (post behavior.json land)
          systemd:
            name: "{{ sup_service_name }}"
            state: started
            daemon_reload: yes

        - name: Wait for service to settle and probe state
          # Brain startup (Ollama warmup, Selenium init, model load) takes
          # 5-30s. Poll every 5s up to 30s for the service to reach `active`.
          # `pause` would have been simpler but it's incompatible with
          # `strategy: free`, so use a retry-until shell probe — same effect,
          # plus we exit early if it's already up.
          shell: |
            STATE=$(systemctl is-active {{ sup_service_name }} 2>/dev/null || echo unknown)
            NR=$(systemctl show {{ sup_service_name }} -p NRestarts --value 2>/dev/null || echo 0)
            echo "state=${STATE} nrestarts=${NR}"
          register: svc_probe
          changed_when: false
          retries: 6
          delay: 5
          until: "'state=active' in svc_probe.stdout"
          # Don't fail the play here — the explicit assertion task below produces
          # a richer error message with the log path. This task only polls.
          failed_when: false

        - name: Assert SUP service is active and not crash-looping
          # NRestarts > 5 immediately after start means the brain is still
          # rejecting something — even with behavior.json on disk. Most likely
          # cause: schema mismatch (PHASE bumped contract, RUSE didn't catch
          # up), Ollama unreachable, or workflow registration error. Surface
          # journalctl in the failure message so the operator doesn't have to
          # SSH to figure out what's broken.
          fail:
            msg: >-
              {{ sup_service_name }} on {{ inventory_hostname }} is
              {{ svc_probe.stdout }} after 30s. behavior.json IS on disk
              ({{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/behavior.json),
              but the service won't stabilize. Check
              `tail /opt/ruse/deployed_sups/{{ sup_behavior }}/logs/systemd_error.log`
              on the VM.
          when: >-
            'state=active' not in svc_probe.stdout
            or (svc_probe.stdout | regex_search('nrestarts=([0-9]+)', '\\1') | first | int) > 5
