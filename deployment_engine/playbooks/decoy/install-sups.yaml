---
# Ansible Playbook: install-sups.yaml
# Install SUP agents on provisioned VMs (stage 1 → reboot → stage 2).
# Display/summary is handled by the Python CLI.
#
# Prerequisites: provision-vms.yaml must have run first (inventory.ini exists).
#
# Usage:
#   ansible-playbook -i runs/032226/inventory.ini install-sups.yaml \
#       -e deployment_dir=../decoy-controls

- name: Install SUPs
  hosts: sup_hosts
  become: yes
  serial: 10
  strategy: free
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o ConnectTimeout=30 -o IdentitiesOnly=yes'
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    ansible_ssh_retries: 5
    deployment_dir: "{{ playbook_dir }}"
    config_file: "{{ deployment_dir }}/config.yaml"
    ruse_repo: "https://github.com/LampSteven17/RUSE.git"
    ruse_branch: "main"
    ruse_path: "/opt/ruse"

  pre_tasks:
    - name: Wait for SSH
      wait_for_connection:
        delay: 5
        timeout: 300
      retries: 3
      delay: 10

    - name: Load deployment configuration
      include_vars:
        file: "{{ config_file }}"
      delegate_to: localhost
      run_once: true

  tasks:
    # C0 is bare Ubuntu — skip everything, just verify SSH works
    - name: Skip C0 (bare control VM)
      meta: end_host
      when: sup_behavior == 'C0'

    - name: Wait for cloud-init
      command: cloud-init status --wait
      changed_when: false
      timeout: 300

    # Pin VM clock to EST/EDT. PHASE-emitted timing arrays (hourly_distribution,
    # activity_probability_per_hour, hourly_std_targets) are hour-of-day indexed
    # off EST Zeek captures. A UTC-zoned SUP would index the wrong slot every
    # hour — behavior fires 4-5h offset from the measurement window.
    - name: Set timezone to America/New_York
      timezone:
        name: America/New_York

    # Retry the early fetch tasks — apt mirrors and github.com both flake
    # with "unknown reason" on fresh VMs. These retries don't mask failure:
    # after N attempts the task still fails loud and spinup.py aborts.
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      register: apt_cache_update
      until: apt_cache_update is succeeded
      retries: 3
      delay: 30

    - name: Install prerequisites
      apt:
        name: [git, curl, wget]
        state: present
      register: apt_prereqs
      until: apt_prereqs is succeeded
      retries: 3
      delay: 30

    - name: Clone RUSE repo
      git:
        repo: "{{ ruse_repo }}"
        dest: "{{ ruse_path }}"
        version: "{{ ruse_branch }}"
        force: yes
      register: clone_ruse
      until: clone_ruse is succeeded
      retries: 3
      delay: 15

    - name: Make INSTALL_SUP.sh executable
      file:
        path: "{{ ruse_path }}/INSTALL_SUP.sh"
        mode: '0755'

    - name: "Stage 1: system deps + drivers"
      shell: |
        cd {{ ruse_path }}
        ./INSTALL_SUP.sh --{{ sup_behavior }} --stage=1
      args:
        executable: /bin/bash
      async: 1800
      poll: 30
      register: stage1_result
      failed_when: stage1_result.rc not in [0, 100]

    - name: Reboot for NVIDIA drivers (exit code 100)
      reboot:
        reboot_timeout: 600
        msg: "Rebooting for NVIDIA driver"
      when: stage1_result.rc == 100

    - name: "Stage 2: ollama + python + services"
      shell: |
        cd {{ ruse_path }}
        RUSE_NO_SERVICE_START=1 ./INSTALL_SUP.sh --{{ sup_behavior }} --stage=2
      args:
        executable: /bin/bash
      async: 1800
      poll: 30
      register: stage2_result
      # RUSE_NO_SERVICE_START=1: install + enable, do NOT start. The mandatory
      # behavior.json check crash-loops the service 60-100x between INSTALL_SUP.sh
      # finishing and distribute-behavior-configs.yaml landing the file — those
      # restarts inflate NRestarts permanently and pollute the audit forever.
      # distribute-behavior-configs.yaml starts the service AFTER the file is in
      # place. M0 (which skips distribute and is expected to crash on Linux) gets
      # started at the tail of THIS playbook.

    - name: Assert Stage 2 succeeded
      # S3: Previously stage2_result.rc was registered but never explicitly
      # checked. Ansible defaults to failing the task on rc != 0 so the play
      # would abort, but with no clear message. Add explicit assertion so the
      # failure reason reaches the operator.
      fail:
        msg: >-
          Stage 2 install failed on {{ inventory_hostname }} (rc={{ stage2_result.rc }}).
          stderr: {{ stage2_result.stderr | default('') | truncate(400) }}
      when: stage2_result.rc != 0

    # NOTE: service-active assertion moved to distribute-behavior-configs.yaml
    # tail. Reason: with mandatory behavior.json, the brain raises on missing
    # config — so between INSTALL_SUP.sh starting the service (end of stage 2)
    # and distribute-behavior-configs.yaml landing the file, the service
    # crash-loops briefly. Asserting "active" here would race that window and
    # fail spuriously. The distribute tail asserts active + NRestarts ≤ 20
    # AFTER the file lands, which is the real fail-loud signal.

    # MCHP brains have a slow Selenium/pyautogui memory leak. Schedule a daily
    # service restart at 03:00 UTC + a weekly full VM reboot Sundays at 04:00 UTC
    # to keep them healthy. M brains only — B/S brains don't need this.
    - name: Install MCHP maintenance cron entries (daily restart + weekly reboot)
      when: sup_behavior is match('^M[0-9]')
      cron:
        name: "{{ item.name }}"
        user: root
        minute: "{{ item.minute }}"
        hour: "{{ item.hour }}"
        weekday: "{{ item.weekday | default('*') }}"
        job: "{{ item.job }}"
      loop:
        - name: mchp-daily-restart
          minute: "0"
          hour: "3"
          job: "/bin/systemctl restart {{ sup_behavior | lower | replace('.', '_') }}.service"
        - name: mchp-weekly-reboot
          minute: "0"
          hour: "4"
          weekday: "0"
          job: "/sbin/reboot"

    - name: Verify MCHP cron entries were installed (M-series only)
      # S5: Previously the cron module's success wasn't audited. If the module
      # silently no-op'd (missing crontab, permission issue), the VM would hit
      # the Selenium memory leak after ~4 days with no warning. This check
      # confirms both cron entries actually reached the crontab.
      when: sup_behavior is match('^M[0-9]')
      shell: crontab -l | grep -cE 'mchp-(daily-restart|weekly-reboot)' || echo 0
      register: cron_count
      changed_when: false
      failed_when: false

    - name: Assert both MCHP crons are installed
      fail:
        msg: >-
          Only {{ cron_count.stdout | trim }}/2 MCHP maintenance crons found on
          {{ inventory_hostname }}. Without these the M-brain will exhaust memory
          after ~4 days. Check crontab -l and systemctl status cron.
      when:
        - sup_behavior is match('^M[0-9]')
        - (cron_count.stdout | default('0') | trim | int) < 2

    # M0 has no behavior.json (read-only upstream control) and skips
    # distribute-behavior-configs.yaml entirely. Start it here, since the
    # stage-2 install left every service stopped (RUSE_NO_SERVICE_START=1).
    # M0 is expected to crash-loop on Linux (Windows-only os.startfile()) — the
    # audit reports `EXPECTED (M0 upstream crashes on Linux)` and treats it as
    # the baseline. C0 has no service installed at all, so it needs no start.
    - name: Start M0 service (skips distribute, no behavior.json required)
      when: sup_behavior == 'M0'
      systemd:
        name: m0.service
        state: started
