---
# Ansible Playbook: teardown-all.yaml
# Destroy ALL DECOY/RAMPART/GHOSTS VMs and their volumes.
#
# Usage:
#   ansible-playbook -i hosts.ini teardown-all.yaml

- name: Teardown ALL VMs
  hosts: openstack_controller
  gather_facts: false

  vars:
    os_rc_file: "{{ lookup('env', 'HOME') }}/vxn3kr-bot-rc"
    all_prefixes: "(d-|r-|g-)"

  tasks:
    # ── Find servers ─────────────────────────────────────────────────
    - name: Get list of ALL servers
      shell: |
        source {{ os_rc_file }}
        openstack server list -f value -c ID -c Name | grep -E "{{ all_prefixes }}" || true
      args:
        executable: /bin/bash
      register: server_list

    - name: Get attached volume IDs
      shell: |
        source {{ os_rc_file }}
        for server in $(openstack server list -f value -c Name | grep -E "{{ all_prefixes }}"); do
          openstack server show "$server" -f json | jq -r '.volumes_attached[]?.id' 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      register: attached_volume_ids
      when: server_list.stdout | length > 0

    # ── Delete servers ───────────────────────────────────────────────
    - name: Delete ALL servers
      shell: |
        source {{ os_rc_file }}
        openstack server delete "{{ item.split()[0] }}"
      args:
        executable: /bin/bash
      loop: "{{ server_list.stdout_lines }}"
      loop_control:
        label: "{{ item.split()[1] | default(item) }}"
      throttle: 50
      when: server_list.stdout | length > 0
      ignore_errors: yes
      async: 300
      poll: 0

    - name: Wait for servers to be deleted
      shell: |
        source {{ os_rc_file }}
        if ! openstack server show "{{ item.split()[0] }}" &>/dev/null; then
          exit 0
        else
          exit 1
        fi
      args:
        executable: /bin/bash
      loop: "{{ server_list.stdout_lines }}"
      loop_control:
        label: "{{ item.split()[1] | default(item) }}"
      register: vm_delete_check
      until: vm_delete_check.rc == 0
      retries: 60
      delay: 3
      throttle: 50
      when: server_list.stdout | length > 0
      ignore_errors: yes

    # ── Delete volumes ───────────────────────────────────────────────
    - name: Get ALL volumes
      shell: |
        source {{ os_rc_file }}
        openstack volume list -f value -c ID -c Name | grep -E "{{ all_prefixes }}" | awk '{print $1}' || true
      args:
        executable: /bin/bash
      register: all_volumes

    - name: Build combined volume list
      set_fact:
        all_volume_ids: "{{ (all_volumes.stdout_lines | default([])) | union(attached_volume_ids.stdout_lines | default([]) | select('match', '.+') | list) | unique }}"

    - name: Delete ALL volumes
      shell: |
        source {{ os_rc_file }}
        openstack volume delete "{{ item }}"
      args:
        executable: /bin/bash
      loop: "{{ all_volume_ids }}"
      loop_control:
        label: "{{ item }}"
      throttle: 50
      when: all_volume_ids | length > 0
      ignore_errors: yes
      async: 300
      poll: 0

    - name: Wait for volumes to be deleted
      shell: |
        source {{ os_rc_file }}
        if ! openstack volume show "{{ item }}" &>/dev/null; then
          exit 0
        else
          exit 1
        fi
      args:
        executable: /bin/bash
      loop: "{{ all_volume_ids }}"
      loop_control:
        label: "{{ item }}"
      register: vol_delete_check
      until: vol_delete_check.rc == 0
      retries: 60
      delay: 3
      throttle: 50
      when: all_volume_ids | length > 0
      ignore_errors: yes

    # ── Orphan volume cleanup ────────────────────────────────────────
    - name: Find orphaned boot volumes (nameless, 200GB, available)
      shell: |
        source {{ os_rc_file }}
        openstack volume list -f json | jq -r '.[] | select(.Name == "" and .Size == 200 and .Status == "available") | .ID'
      args:
        executable: /bin/bash
      register: orphan_volumes

    - name: Delete orphaned boot volumes
      shell: |
        source {{ os_rc_file }}
        openstack volume delete "{{ item }}"
      args:
        executable: /bin/bash
      loop: "{{ orphan_volumes.stdout_lines }}"
      loop_control:
        label: "{{ item }}"
      throttle: 50
      when: orphan_volumes.stdout_lines | length > 0
      ignore_errors: yes
      async: 300
      poll: 0

    # ── Cleanup ──────────────────────────────────────────────────────
    - name: Remove ALL local inventory files
      delegate_to: localhost
      shell: |
        find "{{ playbook_dir }}/.." -path "*/runs/*/inventory.ini" -type f -delete 2>/dev/null || true
        find "{{ playbook_dir }}/.." -maxdepth 2 -name "inventory.ini" -type f -delete 2>/dev/null || true
      ignore_errors: yes
