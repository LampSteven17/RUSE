---
# Ansible Playbook: teardown.yaml
# Destroy SUP VMs and their volumes for a specific deployment.
#
# Usage:
#   ansible-playbook -i hosts.ini teardown.yaml \
#       -e deployment_dir=../decoy-controls -e deployment_id=controls032226

- name: Teardown SUP VMs
  hosts: openstack_controller
  gather_facts: false

  vars:
    deployment_dir: "{{ playbook_dir }}"
    config_file: "{{ deployment_dir }}/config.yaml"
    os_rc_file: "{{ lookup('env', 'HOME') }}/vxn3kr-bot-rc"

  pre_tasks:
    - name: Load deployment configuration
      include_vars:
        file: "{{ config_file }}"

    - name: Set deployment-scoped prefix
      set_fact:
        deployment_id: "{{ deployment_id | default(deployment_name | regex_replace('-', '')) }}"

    - name: Assert vm_prefix passed by caller
      # Callers (deployments/cli/commands/teardown.py) MUST pass vm_prefix
      # — otherwise the listing query matches the wrong VM cohort and the
      # playbook silently no-ops while reporting success. The legacy
      # `r-{deployment_id}-` default belongs to the bash-deploy era; DECOYs
      # are now `d-`, RAMPART `e-`, GHOSTS `g-`. Refuse to guess.
      assert:
        that:
          - vm_prefix is defined
          - vm_prefix | length > 0
        fail_msg: >-
          vm_prefix not passed by caller. The playbook used to default
          to 'r-{{ deployment_id }}-' which no longer matches any
          subsystem. Pass `-e vm_prefix=d-...-` (DECOY), `e-...-`
          (RAMPART), or `g-...-` (GHOSTS).

  tasks:
    - name: Get list of SUP servers
      # Synchronous on purpose. Earlier this used `async: 120 poll: 5`,
      # but that combo with localhost ansible_connection=local +
      # pipelining=true (ansible.cfg defaults) silently drops stdout in
      # the async result file. The task reports changed=ok but
      # server_list.stdout is empty, so every downstream task skips
      # via `when: server_list.stdout | length > 0`. The local
      # openstack call returns in <30s; sync is fine and the only
      # reliable way to capture stdout. teardown-all.yaml already
      # runs this query synchronously and works.
      shell: |
        source {{ os_rc_file }}
        openstack server list -f value -c ID -c Name | awk '$2 ~ /^{{ vm_prefix }}/' || true
      args:
        executable: /bin/bash
      register: server_list

    - name: Get volume IDs attached to SUP servers
      # Sync — same async-loses-stdout reason as the listing task above.
      shell: |
        source {{ os_rc_file }}
        for server in $(openstack server list -f value -c Name | awk '/^{{ vm_prefix }}/'); do
          openstack server show "$server" -f json | jq -r '.volumes_attached[]?.id' 2>/dev/null || true
        done
      args:
        executable: /bin/bash
      register: volume_ids
      when: server_list.stdout | length > 0

    - name: Delete SUP servers
      shell: |
        source {{ os_rc_file }}
        openstack server delete "{{ item.split()[0] }}"
      args:
        executable: /bin/bash
      loop: "{{ server_list.stdout_lines }}"
      loop_control:
        label: "{{ item.split()[1] | default(item) }}"
      when: server_list.stdout | length > 0
      ignore_errors: yes
      async: 300
      poll: 0

    - name: Wait for servers to be deleted
      shell: |
        source {{ os_rc_file }}
        if ! openstack server show "{{ item.split()[0] }}" &>/dev/null; then
          echo "DELETED"
          exit 0
        else
          echo "WAITING"
          exit 1
        fi
      args:
        executable: /bin/bash
      loop: "{{ server_list.stdout_lines }}"
      loop_control:
        label: "{{ item.split()[1] | default(item) }}"
      register: delete_check
      until: delete_check.rc == 0
      retries: 60
      delay: 3
      throttle: 50
      when: server_list.stdout | length > 0
      ignore_errors: yes

    - name: Delete orphaned SUP volumes
      shell: |
        source {{ os_rc_file }}
        for vol in $(openstack volume list -f value -c ID -c Name | awk '$2 ~ /^{{ vm_prefix }}/{print $1}'); do
          openstack volume delete "$vol" || true
        done
        {% for vol_id in (volume_ids.stdout_lines | default([])) %}
        {% if vol_id | trim | length > 0 %}
        openstack volume delete "{{ vol_id }}" 2>/dev/null || true
        {% endif %}
        {% endfor %}
      args:
        executable: /bin/bash
      when: server_list.stdout | length > 0 or (volume_ids is defined and volume_ids.stdout | default('') | length > 0)
      ignore_errors: yes

    - name: Count remaining servers
      shell: |
        source {{ os_rc_file }}
        openstack server list -f value -c Name | awk '/^{{ vm_prefix }}/' | wc -l
      args:
        executable: /bin/bash
      register: remaining_servers
      changed_when: false

    - name: Assert all VMs deleted
      assert:
        that: remaining_servers.stdout | trim | int == 0
        fail_msg: "{{ remaining_servers.stdout | trim }} VMs still exist with prefix {{ vm_prefix }}"
      ignore_errors: yes
      register: verify_result

    - name: Remove local inventory file
      delegate_to: localhost
      file:
        path: "{{ (run_dir | default(deployment_dir)) }}/inventory.ini"
        state: absent
      when: verify_result is not defined or verify_result is not failed
      ignore_errors: yes
