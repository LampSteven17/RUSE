---
# rampart-controls: Enterprise network deployment (AD, Moodle, IIS, endpoints)
# Uses uva-cs-workflow scripts (fixed nomod version at ~/uva-cs-workflow).

deployment_name: rampart-controls
type: rampart

enterprise:
  workflow_dir: ~/uva-cs-workflow
  cloud_config: cloud-configs/axes-cicd.json
  enterprise_config: enterprise-configs/enterprise-med.json
  user_roles: user-roles/user-roles.json

emulate:
  seed: 42
  duration_days: 7
