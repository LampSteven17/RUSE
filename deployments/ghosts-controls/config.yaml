---
# ghosts-controls: GHOSTS NPC baseline traffic generators
#
# Deploys 1 API VM (Docker stack: ghosts-api, postgres, frontend, n8n, grafana)
# plus N client VMs (GHOSTS universal client containers).
#
# Total VMs: 6 (1 api + 5 npc clients)

deployment_name: ghosts-controls
type: ghosts

# PHASE owns the controls source of truth (post 2026-05-08). Per-NPC
# timeline.json files at this path carry _phase_metadata.mode=controls;
# the same per-NPC routing pipeline used for feedback consumes them, so
# controls and feedback are bit-identical in shape — the difference is
# purely in the timeline contents that PHASE emits. Without this,
# controls deploys would fall back to the upstream cmu-sei/GHOSTS default
# timeline, which is not under experiment control.
behavior_source: /mnt/AXES2U1/feedback/ghosts-controls/controls

ghosts:
  api_flavor: v1.14vcpu.28g
  client_flavor: v1.14vcpu.28g
  client_count: 5
  ghosts_repo: https://github.com/cmu-sei/GHOSTS.git
  # PINNED to the v9.0.0 release tag (2026-06-09) instead of tracking master.
  # Tracking master silently regressed the BrowserFirefox handler on 2026-06-06
  # (Selenium auto-fetched Firefox 151 needing libgtk-3, which isn't installed —
  # NPCs stopped browsing fleet-wide, undetected). The git clone uses this as
  # `version:` which accepts a tag. NOTE: pinning the GHOSTS *source* does NOT
  # pin the runtime Firefox binary — see install-ghosts-clients.yaml's firefox
  # install. ghosts_branch field name kept for back-compat; value is a tag.
  ghosts_branch: v9.0.0
