---
# Ansible Playbook: provision-vms.yaml
# Provision OpenStack VMs and generate inventory.ini + SSH config snippet.
# Display/validation is handled by the Python CLI — this playbook only does infrastructure.
#
# Usage:
#   ansible-playbook -i hosts.ini provision-vms.yaml \
#       -e deployment_dir=../ruse-controls -e deployment_id=controls032226 -e run_dir=...

- name: Provision VMs
  hosts: openstack_controller
  gather_facts: false

  vars:
    deployment_dir: "{{ playbook_dir }}"
    config_file: "{{ deployment_dir }}/config.yaml"
    os_rc_file: "{{ lookup('env', 'HOME') }}/vxn3kr-bot-rc"
    os_image: "noble-amd64"
    os_network: "ext_net"
    os_keypair: "bot-desktop"
    os_security_group: "default"
    ssh_config_file: "/home/ubuntu/.ssh/config"

  pre_tasks:
    - name: Load deployment configuration
      include_vars:
        file: "{{ config_file }}"

    - name: Set deployment prefix
      set_fact:
        deployment_id: "{{ deployment_id | default(deployment_name | regex_replace('-', '')) }}"

    - name: Set VM prefix and output paths
      set_fact:
        vm_prefix: "r-{{ deployment_id }}-"
        output_dir: "{{ run_dir | default(deployment_dir) }}"
        inventory_file: "{{ (run_dir | default(deployment_dir)) }}/inventory.ini"

  tasks:
    # ── Expand deployments to VM list ────────────────────────────────
    - name: Expand deployments to VM list
      set_fact:
        vm_list: >-
          {%- set vms = [] -%}
          {%- set behavior_counts = {} -%}
          {%- for dep in deployments -%}
            {%- for i in range(dep.count) -%}
              {%- set idx = behavior_counts.get(dep.behavior, 0) -%}
              {%- set _ = behavior_counts.update({dep.behavior: idx + 1}) -%}
              {%- set _ = vms.append({'behavior': dep.behavior, 'flavor': dep.flavor, 'index': idx}) -%}
            {%- endfor -%}
          {%- endfor -%}
          {{ vms }}

    # ── Create VMs (batched) ─────────────────────────────────────────
    - name: Create OpenStack VMs
      shell: |
        source {{ os_rc_file }}
        VM_NAME="{{ vm_prefix }}{{ item.behavior | replace('.', '-') }}-{{ item.index }}"
        if openstack server show "$VM_NAME" &>/dev/null; then
          echo "EXISTS: $VM_NAME"
        else
          openstack server create \
            --flavor "{{ item.flavor }}" \
            --image "{{ os_image }}" \
            --boot-from-volume 200 \
            --network "{{ os_network }}" \
            --key-name "{{ os_keypair }}" \
            --security-group "{{ os_security_group }}" \
            --property deployment="{{ deployment_id }}" \
            -f value -c id \
            "$VM_NAME"
          echo "CREATED: $VM_NAME"
        fi
      args:
        executable: /bin/bash
      loop: "{{ vm_list }}"
      loop_control:
        label: "{{ vm_prefix }}{{ item.behavior }}-{{ item.index }}"
      throttle: "{{ vm_create_batch_size | default(10) }}"
      register: created_vms

    # ── Wait for ACTIVE ──────────────────────────────────────────────
    - name: Wait for all VMs to become ACTIVE
      shell: |
        source {{ os_rc_file }}
        VM_NAME="{{ vm_prefix }}{{ item.behavior | replace('.', '-') }}-{{ item.index }}"
        STATUS=$(openstack server show "$VM_NAME" -f value -c status 2>/dev/null || echo "UNKNOWN")
        if [ "$STATUS" = "ACTIVE" ]; then
          echo "ACTIVE"
          exit 0
        elif [ "$STATUS" = "ERROR" ]; then
          echo "ERROR: VM in error state"
          exit 1
        else
          echo "BUILDING: $STATUS"
          exit 2
        fi
      args:
        executable: /bin/bash
      loop: "{{ vm_list }}"
      loop_control:
        label: "{{ vm_prefix }}{{ item.behavior }}-{{ item.index }}"
      register: vm_status_check
      until: vm_status_check.rc == 0 or vm_status_check.rc == 1
      retries: 60
      delay: 5
      throttle: 20
      failed_when: false

    # ── Identify successful/failed VMs ───────────────────────────────
    - name: Identify failed VMs
      set_fact:
        failed_vms: >-
          {%- set failed = [] -%}
          {%- for result in vm_status_check.results -%}
            {%- if result.rc | default(0) != 0 -%}
              {%- set _ = failed.append(vm_list[loop.index0]) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ failed }}
        successful_vms: >-
          {%- set ok = [] -%}
          {%- for result in vm_status_check.results -%}
            {%- if result.rc | default(0) == 0 -%}
              {%- set _ = ok.append(vm_list[loop.index0]) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ok }}

    - name: Fail if ALL VMs failed
      fail:
        msg: "All {{ vm_list | length }} VMs failed to provision."
      when: successful_vms | length == 0

    # ── Get IPs ──────────────────────────────────────────────────────
    - name: Get VM IPs
      shell: |
        source {{ os_rc_file }}
        openstack server show "{{ vm_prefix }}{{ item.behavior | replace('.', '-') }}-{{ item.index }}" -f value -c addresses | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
      args:
        executable: /bin/bash
      loop: "{{ successful_vms }}"
      loop_control:
        label: "{{ vm_prefix }}{{ item.behavior }}-{{ item.index }}"
      register: vm_ips

    # ── Build inventory ──────────────────────────────────────────────
    - name: Build inventory data
      set_fact:
        inventory_entries: >-
          {%- set entries = [] -%}
          {%- for result in vm_ips.results -%}
            {%- set vm = successful_vms[loop.index0] -%}
            {%- set entry = {
              'ip': result.stdout,
              'behavior': vm.behavior,
              'flavor': vm.flavor,
              'name': vm_prefix + vm.behavior | replace('.', '-') + '-' + (vm.index | string)
            } -%}
            {%- set _ = entries.append(entry) -%}
          {%- endfor -%}
          {{ entries }}

    - name: Show VM IPs
      debug:
        msg: "{{ item.name }} => {{ item.ip }}"
      loop: "{{ inventory_entries }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Generate inventory file
      delegate_to: localhost
      copy:
        content: |
          # Auto-generated inventory for {{ deployment_name }}
          # Generated: {{ lookup('pipe', 'date -Iseconds') }}

          [sup_hosts]
          {% for entry in inventory_entries %}
          {{ entry.name }} ansible_host={{ entry.ip }} sup_behavior={{ entry.behavior }} sup_flavor={{ entry.flavor }}
          {% endfor %}

          [sup_hosts:vars]
          ansible_user=ubuntu
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args=-o StrictHostKeyChecking=no
        dest: "{{ inventory_file }}"

    # NOTE: SSH connectivity testing moved to Python CLI (spinup.py)
    # for real-time per-VM progress output. Ansible's callback doesn't
    # show output during retries, causing silent hangs.

    - name: Write SSH config snippet
      delegate_to: localhost
      copy:
        content: |
          ############# SUP VMs - {{ deployment_name }} #############

          Host r-*
              User ubuntu
              PreferredAuthentications publickey
              IdentityFile ~/.ssh/id_ed25519
              IdentitiesOnly yes
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              ServerAliveInterval 120

          {% for entry in inventory_entries %}
          Host {{ entry.name }}
              HostName {{ entry.ip }}

          {% endfor %}
          #############################################
        dest: "{{ output_dir }}/ssh_config_snippet.txt"
