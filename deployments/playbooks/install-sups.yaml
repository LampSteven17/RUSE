---
# Ansible Playbook: install-sups.yaml
# Install SUP agents on provisioned VMs (stage 1 → reboot → stage 2).
# Display/summary is handled by the Python CLI.
#
# Prerequisites: provision-vms.yaml must have run first (inventory.ini exists).
#
# Usage:
#   ansible-playbook -i runs/032226/inventory.ini install-sups.yaml \
#       -e deployment_dir=../ruse-controls

- name: Install SUPs
  hosts: sup_hosts
  become: yes
  serial: 10
  strategy: free
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=60 -o ConnectTimeout=30 -o IdentitiesOnly=yes'
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    ansible_ssh_retries: 5
    deployment_dir: "{{ playbook_dir }}"
    config_file: "{{ deployment_dir }}/config.yaml"
    ruse_repo: "https://github.com/LampSteven17/RUSE.git"
    ruse_branch: "main"
    ruse_path: "/opt/ruse"

  pre_tasks:
    - name: Wait for SSH
      wait_for_connection:
        delay: 5
        timeout: 300
      retries: 3
      delay: 10

    - name: Load deployment configuration
      include_vars:
        file: "{{ config_file }}"
      delegate_to: localhost
      run_once: true

  tasks:
    # C0 is bare Ubuntu — skip everything, just verify SSH works
    - name: Skip C0 (bare control VM)
      meta: end_host
      when: sup_behavior == 'C0'

    - name: Wait for cloud-init
      command: cloud-init status --wait
      changed_when: false
      timeout: 300

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites
      apt:
        name: [git, curl, wget]
        state: present

    - name: Clone RUSE repo
      git:
        repo: "{{ ruse_repo }}"
        dest: "{{ ruse_path }}"
        version: "{{ ruse_branch }}"
        force: yes

    - name: Make INSTALL_SUP.sh executable
      file:
        path: "{{ ruse_path }}/INSTALL_SUP.sh"
        mode: '0755'

    - name: "Stage 1: system deps + drivers"
      shell: |
        cd {{ ruse_path }}
        ./INSTALL_SUP.sh --{{ sup_behavior }} --stage=1
      args:
        executable: /bin/bash
      async: 1800
      poll: 30
      register: stage1_result
      failed_when: stage1_result.rc not in [0, 100]

    - name: Reboot for NVIDIA drivers (exit code 100)
      reboot:
        reboot_timeout: 600
        msg: "Rebooting for NVIDIA driver"
      when: stage1_result.rc == 100

    - name: "Stage 2: ollama + python + services"
      shell: |
        cd {{ ruse_path }}
        ./INSTALL_SUP.sh --{{ sup_behavior }} --stage=2
      args:
        executable: /bin/bash
      async: 1800
      poll: 30
      register: stage2_result

    - name: Check SUP service status
      shell: systemctl is-active $(systemctl list-units --type=service | grep -E '(mchp|smol|bu)' | awk '{print $1}' | head -1) || true
      register: service_status
      changed_when: false
