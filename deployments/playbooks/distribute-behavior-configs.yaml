---
# Ansible Playbook: distribute-behavior-configs.yaml
# Distribute PHASE behavioral configs to deployed SUP VMs.
# Configs take effect at the next cluster boundary — no restart needed.
#
# Usage:
#   ansible-playbook -i inventory.ini distribute-behavior-configs.yaml \
#       -e config_source=~/PHASE/feedback_engine/configs/...
#   ansible-playbook -i inventory.ini distribute-behavior-configs.yaml \
#       -e clear_configs=true

- name: Distribute PHASE behavioral configs
  hosts: sup_hosts
  become: yes
  strategy: free
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ConnectTimeout=30 -o IdentitiesOnly=yes'
    ansible_ssh_private_key_file: "~/.ssh/id_ed25519"
    ruse_path: "/opt/ruse"
    config_source: ""
    clear_configs: false

  tasks:
    # ── Skip controls ────────────────────────────────────────────────
    - name: Skip control configs (C0, M0)
      meta: end_host
      when: sup_behavior in ['C0', 'M0']

    # ── Derive baseline config key ───────────────────────────────────
    - name: Derive behavior directory
      set_fact:
        behavior_dir: "{{ sup_behavior | regex_replace('^([A-Z])\\d+[A-Z]*(.*)$', '\\g<1>\\g<2>') }}"

    - name: Derive baseline version (M=1, B/S=0)
      set_fact:
        baseline_version: "{{ '1' if sup_behavior[0] == 'M' else '0' }}"

    - name: Derive baseline config key
      set_fact:
        baseline_config: "{{ sup_behavior | regex_replace('^([A-Z])\\d+', '\\g<1>VVVV') | replace('VVVV', baseline_version) }}"

    # ── Clear mode ───────────────────────────────────────────────────
    - name: Clear behavior configs
      when: clear_configs | bool
      block:
        - name: Remove behavioral_configurations contents
          file:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/"
            state: absent

        - name: Re-create empty directory
          file:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/"
            state: directory
            mode: '0755'

    # ── Deploy mode ──────────────────────────────────────────────────
    - name: Deploy behavior configs
      when: not (clear_configs | bool)
      block:
        - name: Validate config_source is set
          fail:
            msg: "config_source must be set. Use -e config_source=/path/to/configs"
          when: config_source == ""
          run_once: true
          delegate_to: localhost

        - name: Resolve source directory
          set_fact:
            config_source_dir: "{{ config_source }}/{{ behavior_dir }}/{{ baseline_config }}"

        - name: Check source exists
          stat:
            path: "{{ config_source_dir }}"
          delegate_to: localhost
          register: source_dir

        - name: Assert behavior config source exists
          # Previously the deploy block was gated on `when: source_dir.stat.exists`
          # which meant if the source dir was missing (typo, regen failed, wrong
          # path), the playbook silently skipped config distribution and the
          # feedback deploy degraded to baseline with no warning.
          fail:
            msg: >-
              Behavior config source not found: {{ config_source_dir }}
              (resolved from config_source={{ config_source }}, behavior_dir={{ behavior_dir }},
              baseline_config={{ baseline_config }}). Either the PHASE feedback engine
              didn't generate this config, or the source path is wrong.
          when: not source_dir.stat.exists

        - name: Ensure behavioral_configurations directory
          file:
            path: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/"
            state: directory
            mode: '0755'

        - name: Resolve behavior_configs patterns
          set_fact:
            resolved_behavior_configs: "{{ ['*.json'] if (behavior_configs is not defined or behavior_configs == 'all') else behavior_configs }}"

        - name: Find config files
          find:
            paths: "{{ config_source_dir }}"
            patterns: "{{ resolved_behavior_configs }}"
          delegate_to: localhost
          register: behavior_config_files

        - name: Assert config files were found
          fail:
            msg: >-
              No config files matched patterns {{ resolved_behavior_configs }}
              in {{ config_source_dir }}. PHASE generated an empty or malformed
              feedback source.
          when: behavior_config_files.files | length == 0

        - name: Copy configs to SUP
          copy:
            src: "{{ item.path }}"
            dest: "{{ ruse_path }}/deployed_sups/{{ sup_behavior }}/behavioral_configurations/{{ item.path | basename }}"
            mode: '0644'
          loop: "{{ behavior_config_files.files }}"
          loop_control:
            label: "{{ item.path | basename }}"
